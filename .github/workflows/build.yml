name: Build VCAMBypass

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install make ldid
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          export THEOS=~/theos
          git clone --depth 1 https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          export THEOS=~/theos
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p "$THEOS/sdks"
          ln -sf "$SDK_PATH" "$THEOS/sdks/iPhoneOS.sdk"

      - name: Build Theos .deb
        run: |
          export THEOS=~/theos
          cd "$THEOS" && git submodule update --init --recursive || true
          cd "$GITHUB_WORKSPACE"
          make -f Makefile clean
          make -f Makefile package FINALPACKAGE=1

      - name: Build TrollFools standalone .dylib
        run: |
          mkdir -p trollfools_out
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -arch arm64e \
            -dynamiclib \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -framework Foundation -framework UIKit \
            -install_name @rpath/VCAMBypass.dylib \
            -o trollfools_out/VCAMBypass.dylib \
            Tweak_TrollFools.x
          ldid -S trollfools_out/VCAMBypass.dylib
          ls -lh trollfools_out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VCAMBypass
          path: |
            packages/*.deb
            trollfools_out/*.dylib
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${{ github.ref_name }}" \
            packages/*.deb \
            trollfools_out/*.dylib \
            --title "VCAMBypass ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
